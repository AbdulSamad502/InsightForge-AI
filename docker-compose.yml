version: "3.9"

services:

  # ── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: insightforge_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_data_analyst
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_data_analyst"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── FastAPI Backend ───────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_analyst_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Persist user uploads and generated reports
      - ./backend/app/storage:/app/app/storage
      - ./backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit Frontend ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_analyst_frontend
    ports:
      - "8501:8501"
    env_file:
      - ./frontend/.env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    name: ai_analyst_postgres_data